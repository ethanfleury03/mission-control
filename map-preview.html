<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sasha Island Map Preview</title>
  <script src="https://unpkg.com/@xyflow/react@12.10.0/dist/umd/index.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/@xyflow/react@12.10.0/dist/style.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #fff;
      overflow: hidden;
    }
    #root { width: 100vw; height: 100vh; }
    
    .center-node {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      border: 4px solid rgba(99, 102, 241, 0.5);
      box-shadow: 0 0 60px rgba(99, 102, 241, 0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .center-node:hover { transform: scale(1.05); }
    .center-node .icon { font-size: 48px; }
    .center-node .label { font-weight: bold; font-size: 18px; margin-top: 4px; }
    .center-node .subtitle { font-size: 12px; opacity: 0.7; }
    
    .island-node {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s;
      position: relative;
    }
    .island-node:hover { transform: scale(1.1); }
    .island-node .bg {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      opacity: 0.2;
    }
    .island-node .border {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid;
      box-shadow: 0 0 30px currentColor;
    }
    .island-node .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 8px;
    }
    .island-node .icon { font-size: 32px; }
    .island-node .label { font-weight: 600; font-size: 11px; margin-top: 4px; line-height: 1.2; }
    .island-node .badge {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      color: white;
    }
    
    .legend {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 12px;
    }
    .legend h4 { font-size: 11px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px; }
    .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 12px; color: #cbd5e1; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    
    .controls {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 8px;
    }
    .btn {
      background: rgba(6, 182, 212, 0.1);
      border: 1px solid rgba(6, 182, 212, 0.3);
      color: #06b6d4;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn:hover { background: rgba(6, 182, 212, 0.2); }
    
    .header {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
    }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header p { font-size: 13px; color: #94a3b8; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🏝️ MAP</h1>
    <p>Sasha Architecture - Island View</p>
  </div>
  
  <div class="controls">
    <button class="btn">+ Add Island</button>
  </div>
  
  <div id="root"></div>
  
  <div class="legend">
    <h4>Legend</h4>
    <div class="legend-item">
      <div class="legend-dot" style="background: #6366f1;"></div>
      <span>Core</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background: #10b981;"></div>
      <span>Active</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background: #eab308;"></div>
      <span>Security</span>
    </div>
  </div>

  <script type="module">
    const { ReactFlow, Background, Controls, MiniMap } = window.ReactFlow;
    const React = window.React;
    const ReactDOM = window.ReactDOM;
    
    // Island data
    const islands = [
      { id: 'skills', label: 'Skills &\nAutomations', icon: '🛠️', color: '#10b981', features: 11 },
      { id: 'discord', label: 'Discord\nSetup', icon: '💬', color: '#5865F2', features: 8 },
      { id: 'mission', label: 'Mission\nControl', icon: '🎮', color: '#f97316', features: 5 },
      { id: 'dashboards', label: 'Dashboards', icon: '📊', color: '#06b6d4', features: 3 },
      { id: 'memory', label: 'Memory\nSystems', icon: '🧠', color: '#8b5cf6', features: 8 },
      { id: 'browser', label: 'Browser\n& Web', icon: '🌐', color: '#0ea5e9', features: 2 },
      { id: 'security', label: 'Security &\nAccess', icon: '🔒', color: '#eab308', features: 3 },
    ];
    
    // Calculate positions in circle
    const radius = 400;
    const islandNodes = islands.map((island, i) => {
      const angle = (i * (2 * Math.PI) / islands.length) - Math.PI / 2;
      return {
        id: island.id,
        type: 'island',
        position: { 
          x: Math.cos(angle) * radius + 600, 
          y: Math.sin(angle) * radius + 400 
        },
        data: island,
      };
    });
    
    const nodes = [
      {
        id: 'center',
        type: 'center',
        position: { x: 520, y: 320 },
        data: { label: 'ClawdBot', subtitle: 'Sasha', icon: '🤖' },
      },
      ...islandNodes,
    ];
    
    const edges = islands.map(island => ({
      id: `center-${island.id}`,
      source: 'center',
      target: island.id,
      animated: true,
      style: { stroke: island.color, strokeWidth: 3 },
    }));
    
    const CenterNode = ({ data }) => React.createElement('div', { className: 'center-node' }, [
      React.createElement('div', { key: 'icon', className: 'icon' }, data.icon),
      React.createElement('div', { key: 'label', className: 'label' }, data.label),
      React.createElement('div', { key: 'sub', className: 'subtitle' }, data.subtitle),
    ]);
    
    const IslandNode = ({ data }) => React.createElement('div', { 
      className: 'island-node',
      style: { color: data.color }
    }, [
      React.createElement('div', { key: 'bg', className: 'bg', style: { backgroundColor: data.color } }),
      React.createElement('div', { key: 'border', className: 'border', style: { borderColor: data.color } }),
      React.createElement('div', { key: 'content', className: 'content' }, [
        React.createElement('div', { key: 'icon', className: 'icon' }, data.icon),
        React.createElement('div', { key: 'label', className: 'label' }, data.label),
      ]),
      React.createElement('div', { 
        key: 'badge', 
        className: 'badge',
        style: { backgroundColor: data.color }
      }, data.features),
    ]);
    
    const nodeTypes = {
      center: CenterNode,
      island: IslandNode,
    };
    
    const App = () => React.createElement(ReactFlow, {
      nodes,
      edges,
      nodeTypes,
      fitView: true,
      fitViewOptions: { padding: 0.3 },
      minZoom: 0.4,
      maxZoom: 1.5,
    }, [
      React.createElement(Background, { key: 'bg', color: '#334155', gap: 20 }),
      React.createElement(Controls, { key: 'ctrl', style: { background: '#1e293b', borderColor: 'rgba(255,255,255,0.1)' } }),
      React.createElement(MiniMap, { 
        key: 'minimap', 
        style: { background: '#1e293b', border: '1px solid rgba(255,255,255,0.1)' }
      }),
    ]);
    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
