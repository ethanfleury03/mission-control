# Build and deploy mc-api (Express + Postgres) to Cloud Run (private).
#
# Requires:
#   - _CLOUD_SQL_INSTANCE: "project:region:instance" for --add-cloudsql-instances
#   - Secret Manager secret _API_DB_SECRET containing the full DATABASE_URL
#     (postgresql://user:pw@127.0.0.1/missioncontrol?host=/cloudsql/<INSTANCE>).
#
# The service is deployed with --no-allow-unauthenticated; only principals with
# roles/run.invoker (mc-web-sa, mc-scraper-sa) can reach it.

substitutions:
  _REGION: us-central1
  _AR_REPO: mission-control
  _SERVICE: mc-api
  _SERVICE_ACCOUNT: mc-api-sa
  _CLOUD_SQL_INSTANCE: ''
  _API_DB_SECRET: mc-api-db-url
  _WEBHOOK_URL_SECRET: mc-webhook-url
  _WEBHOOK_SECRET_SECRET: mc-webhook-secret

# User-managed worker (bootstrap creates mc-build-runner). Required when org policy blocks
# PROJECT_NUMBER@cloudbuild.gserviceaccount.com. With a custom SA, logs MUST be CLOUD_LOGGING_ONLY.
serviceAccount: 'projects/$PROJECT_ID/serviceAccounts/mc-build-runner@$PROJECT_ID.iam.gserviceaccount.com'

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - '-f'
      - server/Dockerfile
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$BUILD_ID'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest'
      - server

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}'

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        if [ -z "${_CLOUD_SQL_INSTANCE}" ]; then
          echo "FATAL: _CLOUD_SQL_INSTANCE substitution is required" >&2
          exit 1
        fi
        SECRET_FLAGS="--set-secrets=DATABASE_URL=${_API_DB_SECRET}:latest"
        for OPTIONAL in MISSION_CONTROL_WEBHOOK_URL=${_WEBHOOK_URL_SECRET} MISSION_CONTROL_WEBHOOK_SECRET=${_WEBHOOK_SECRET_SECRET}; do
          NAME="$${OPTIONAL%%=*}"
          SECRET="$${OPTIONAL##*=}"
          if [ -n "$$SECRET" ] && gcloud secrets describe "$$SECRET" --project="$PROJECT_ID" >/dev/null 2>&1; then
            SECRET_FLAGS="$$SECRET_FLAGS,$$NAME=$$SECRET:latest"
          fi
        done
        gcloud run deploy "${_SERVICE}" \
          --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$BUILD_ID" \
          --region "${_REGION}" \
          --platform managed \
          --no-allow-unauthenticated \
          --port 8080 \
          --cpu-boost \
          --startup-probe="initialDelaySeconds=0,timeoutSeconds=5,periodSeconds=5,failureThreshold=60,httpGet.port=8080,httpGet.path=/health/live" \
          --service-account "${_SERVICE_ACCOUNT}@$PROJECT_ID.iam.gserviceaccount.com" \
          --add-cloudsql-instances "${_CLOUD_SQL_INSTANCE}" \
          --set-env-vars "NODE_ENV=production,PGSSLMODE=disable" \
          $$SECRET_FLAGS

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$BUILD_ID'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
