# Build and deploy the production Outreach Deep Sync bridge to Cloud Run.

substitutions:
  _REGION: us-central1
  _AR_REPO: mission-control
  _SERVICE: mc-outreach-deep-sync
  _SERVICE_ACCOUNT: mc-outreach-deep-sync-sa
  _STATE_GCS_URI: ''
  _OUTREACH_WEBHOOK_SECRET_SECRET: mc-outreach-crm-webhook-secret

serviceAccount: 'projects/$PROJECT_ID/serviceAccounts/mc-build-runner@$PROJECT_ID.iam.gserviceaccount.com'

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - '-f'
      - services/outreach-deep-sync/Dockerfile
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$BUILD_ID'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest'
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}'

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        if [ -z "${_STATE_GCS_URI}" ]; then
          echo "FATAL: _STATE_GCS_URI is required" >&2
          exit 1
        fi
        gcloud run deploy "${_SERVICE}" \
          --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$BUILD_ID" \
          --region "${_REGION}" \
          --platform managed \
          --no-invoker-iam-check \
          --port 8080 \
          --cpu 1 \
          --memory 256Mi \
          --min-instances 0 \
          --max-instances 2 \
          --timeout 180s \
          --concurrency 10 \
          --service-account "${_SERVICE_ACCOUNT}@$PROJECT_ID.iam.gserviceaccount.com" \
          --set-env-vars "SASHA_OUTREACH_STATE_GCS_URI=${_STATE_GCS_URI}" \
          --set-secrets "OUTREACH_CRM_WEBHOOK_SECRET=${_OUTREACH_WEBHOOK_SECRET_SECRET}:latest"

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$BUILD_ID'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
