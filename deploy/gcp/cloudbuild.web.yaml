# Build and deploy mc-web (Next.js dashboard) to Cloud Run.
#
# Substitutions (all have defaults that match bootstrap.sh):
#   _REGION, _AR_REPO, _SERVICE, _SERVICE_ACCOUNT, _API_URL, _CLOUD_SQL_INSTANCE
#   _APP_DB_SECRET, _AUTH_SECRET, _GOOGLE_ID_SECRET, _GOOGLE_SECRET_SECRET
#
# Invoked by bootstrap.sh via (global Cloud Build — do not pass --region on submit):
#   gcloud builds submit . --gcs-source-staging-dir=gs://PROJECT_ID_cloudbuild/source \
#     --config=deploy/gcp/cloudbuild.web.yaml \
#     --substitutions=_REGION=us-central1,_API_URL=https://mc-api-xxx.run.app

substitutions:
  _REGION: us-central1
  _AR_REPO: mission-control
  _SERVICE: mc-web
  _SERVICE_ACCOUNT: mc-web-sa
  _API_URL: ''
  _CLOUD_SQL_INSTANCE: ''
  _ENABLE_BLOGS: 'false'
  _NEXT_PUBLIC_ENABLE_BLOGS: 'false'
  _AUTH_PUBLIC_URL: ''
  _IMAGE_CHAT_MODEL: deepseek/deepseek-v4-flash
  _IMAGE_IMAGE_MODEL: openai/gpt-5.4-image-2
  _IMAGE_VIDEO_MODEL: kwaivgi/kling-v3.0-pro
  _HELP_DESK_AI_PLAN_MODEL: anthropic/claude-opus-4.7
  _HELP_DESK_AI_PLAN_MAX_TOKENS: '8000'
  _APP_DB_SECRET: mc-app-db-url
  _AUTH_SECRET: mc-auth-secret
  _GOOGLE_ID_SECRET: mc-google-client-id
  _GOOGLE_SECRET_SECRET: mc-google-client-secret
  _OPENROUTER_SECRET: mc-openrouter
  _OPENAI_SECRET: mc-openai
  _IMAGE_OPENROUTER_SECRET: mc-image-openrouter
  _FIRECRAWL_SECRET: mc-firecrawl
  _SERPER_SECRET: mc-serper
  _HUBSPOT_TOKEN_SECRET: mc-hubspot-token
  _HUBSPOT_PORTAL_SECRET: mc-hubspot-portal
  _RAPIDAPI_SECRET: mc-rapidapi-key
  _GOOGLE_SA_EMAIL_SECRET: mc-google-sa-email
  _GOOGLE_SA_KEY_SECRET: mc-google-sa-key
  _OUTREACH_SERVICE_TOKEN_SECRET: mc-outreach-crm-service-token
  _OUTREACH_WEBHOOK_SECRET_SECRET: mc-outreach-crm-webhook-secret
  _OUTREACH_OPENCLAW_GATEWAY_URL_SECRET: mc-outreach-crm-openclaw-gateway-url
  _OUTREACH_OPENCLAW_WEBHOOK_URL_SECRET: mc-outreach-crm-openclaw-webhook-url
  _RETELL_API_SECRET: mc-retell-api-key
  _PHONE_RETELL_AGENT_IDS_SECRET: mc-phone-retell-agent-ids
  _PHONE_RETELL_AGENT_ID_SECRET: mc-phone-retell-agent-id
  _PHONE_RETELL_PROFILE_KEY_SECRET: mc-phone-retell-profile-key
  _PHONE_RETELL_PROFILE_LABEL_SECRET: mc-phone-retell-profile-label
  _PHONE_RETELL_CONVERSATION_FLOW_ID_SECRET: mc-phone-retell-conversation-flow-id
  _PHONE_RETELL_OUTBOUND_NUMBER_SECRET: mc-phone-retell-outbound-number
  _PHONE_RETELL_OUTBOUND_NUMBER_LABEL_SECRET: mc-phone-retell-outbound-number-label
  _PHONE_RETELL_VOICE_LABEL_SECRET: mc-phone-retell-voice-label
  _PHONE_RETELL_WEBHOOK_STATUS_SECRET: mc-phone-retell-webhook-status
  _OUTREACH_OPENCLAW_TRANSPORT: gateway
  _OUTREACH_DEEP_SYNC_ENABLED: 'false'

serviceAccount: 'projects/$PROJECT_ID/serviceAccounts/mc-build-runner@$PROJECT_ID.iam.gserviceaccount.com'

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - '-f'
      - Dockerfile
      - '--build-arg'
      - 'NEXT_PUBLIC_ENABLE_BLOGS=${_NEXT_PUBLIC_ENABLE_BLOGS}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$BUILD_ID'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest'
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}'

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        # Single --set-env-vars: avoid --update-env-vars for API URL on *first* deploy
        # (avoids gcloud exit 2 when the service has no previous env to merge into).
        # ${_API_URL} is a Cloud Build substitution, expanded when the build is created.
        API_URL_S="${_API_URL}"
        AUTH_PUBLIC_URL_S="${_AUTH_PUBLIC_URL}"
        SET_ENV="NODE_ENV=production,AUTH_TRUST_HOST=true,ENABLE_BLOGS=${_ENABLE_BLOGS},NEXT_PUBLIC_ENABLE_BLOGS=${_NEXT_PUBLIC_ENABLE_BLOGS},IMAGE_OPENROUTER_CHAT_MODEL=${_IMAGE_CHAT_MODEL},IMAGE_OPENROUTER_IMAGE_MODEL=${_IMAGE_IMAGE_MODEL},IMAGE_OPENROUTER_VIDEO_MODEL=${_IMAGE_VIDEO_MODEL},RAPIDAPI_HOST=local-business-data.p.rapidapi.com,RAPIDAPI_ENDPOINT=/search,RAPIDAPI_LANGUAGE=en,RAPIDAPI_REGION=us,RAPIDAPI_EXTRACT_EMAILS_AND_CONTACTS=false,STORAGE_DIR=/tmp/mission-control-storage,OPENROUTER_BASE_URL=https://openrouter.ai/api/v1,RAG_LLM_PROVIDER=openrouter,RAG_LLM_MODEL=deepseek/deepseek-v4-flash,RAG_QUERY_MODEL=deepseek/deepseek-v4-flash,RAG_METADATA_MODEL=deepseek/deepseek-v4-flash,HELP_DESK_AI_PLAN_MODEL=${_HELP_DESK_AI_PLAN_MODEL},HELP_DESK_AI_PLAN_MAX_TOKENS=${_HELP_DESK_AI_PLAN_MAX_TOKENS},RAG_RERANK_PROVIDER=openrouter,RAG_RERANK_MODEL=deepseek/deepseek-v4-flash,RAG_EMBEDDING_PROVIDER=openrouter,RAG_EMBEDDING_MODEL=text-embedding-3-large,RAG_UPLOAD_BUCKET=$PROJECT_ID-rag-manuals-stage,RAG_MAX_GCS_UPLOAD_BYTES=786432000,OUTREACH_CRM_DEEP_SYNC_ENABLED=${_OUTREACH_DEEP_SYNC_ENABLED},OUTREACH_CRM_OPENCLAW_TRANSPORT=${_OUTREACH_OPENCLAW_TRANSPORT},OUTREACH_CRM_OPENCLAW_AGENT_ID=sasha-outreach,OUTREACH_CRM_HUBSPOT_LIST_ID=102,OUTREACH_CRM_FIRST_TOUCH_DAILY_CAP=10,OUTREACH_CRM_FOLLOWUP_RUN_CAP=5,OUTREACH_CRM_BATCH_PACING_SECONDS=60"
        if [ -n "$$API_URL_S" ]; then
          SET_ENV="$$SET_ENV,API_URL=$$API_URL_S,NEXT_PUBLIC_API_URL=$$API_URL_S,MISSION_CONTROL_API_URL=$$API_URL_S"
        fi
        if [ -n "$$AUTH_PUBLIC_URL_S" ]; then
          SET_ENV="$$SET_ENV,NEXTAUTH_URL=$$AUTH_PUBLIC_URL_S,AUTH_URL=$$AUTH_PUBLIC_URL_S,OUTREACH_CRM_CALLBACK_URL=$$AUTH_PUBLIC_URL_S/api/outreach-crm/v1/openclaw/callback"
        fi
        if [ -z "${_CLOUD_SQL_INSTANCE}" ]; then
          echo "FATAL: _CLOUD_SQL_INSTANCE substitution is required" >&2
          exit 1
        fi
        SECRET_FLAGS="--set-secrets=DATABASE_URL=${_APP_DB_SECRET}:latest,AUTH_SECRET=${_AUTH_SECRET}:latest,AUTH_GOOGLE_ID=${_GOOGLE_ID_SECRET}:latest,AUTH_GOOGLE_SECRET=${_GOOGLE_SECRET_SECRET}:latest"
        for OPTIONAL in OPENROUTER_API_KEY=${_OPENROUTER_SECRET} OPENAI_API_KEY=${_OPENAI_SECRET} IMAGE_OPENROUTER_API_KEY=${_IMAGE_OPENROUTER_SECRET} FIRECRAWL_API_KEY=${_FIRECRAWL_SECRET} SERPER_API_KEY=${_SERPER_SECRET} HUBSPOT_ACCESS_TOKEN=${_HUBSPOT_TOKEN_SECRET} HUBSPOT_PORTAL_ID=${_HUBSPOT_PORTAL_SECRET} RAPIDAPI_KEY=${_RAPIDAPI_SECRET} GOOGLE_SERVICE_ACCOUNT_EMAIL=${_GOOGLE_SA_EMAIL_SECRET} GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY=${_GOOGLE_SA_KEY_SECRET} OUTREACH_CRM_SERVICE_TOKEN=${_OUTREACH_SERVICE_TOKEN_SECRET} OUTREACH_CRM_WEBHOOK_SECRET=${_OUTREACH_WEBHOOK_SECRET_SECRET} OUTREACH_CRM_OPENCLAW_GATEWAY_URL=${_OUTREACH_OPENCLAW_GATEWAY_URL_SECRET} OUTREACH_CRM_OPENCLAW_WEBHOOK_URL=${_OUTREACH_OPENCLAW_WEBHOOK_URL_SECRET} RETELL_API_KEY=${_RETELL_API_SECRET} PHONE_RETELL_AGENT_IDS=${_PHONE_RETELL_AGENT_IDS_SECRET} PHONE_RETELL_AGENT_ID=${_PHONE_RETELL_AGENT_ID_SECRET} PHONE_RETELL_PROFILE_KEY=${_PHONE_RETELL_PROFILE_KEY_SECRET} PHONE_RETELL_PROFILE_LABEL=${_PHONE_RETELL_PROFILE_LABEL_SECRET} PHONE_RETELL_CONVERSATION_FLOW_ID=${_PHONE_RETELL_CONVERSATION_FLOW_ID_SECRET} PHONE_RETELL_OUTBOUND_NUMBER=${_PHONE_RETELL_OUTBOUND_NUMBER_SECRET} PHONE_RETELL_OUTBOUND_NUMBER_LABEL=${_PHONE_RETELL_OUTBOUND_NUMBER_LABEL_SECRET} PHONE_RETELL_VOICE_LABEL=${_PHONE_RETELL_VOICE_LABEL_SECRET} PHONE_RETELL_WEBHOOK_STATUS=${_PHONE_RETELL_WEBHOOK_STATUS_SECRET}; do
          NAME="$${OPTIONAL%%=*}"
          SECRET="$${OPTIONAL##*=}"
          if [ -n "$$SECRET" ] && gcloud secrets describe "$$SECRET" --project="$PROJECT_ID" >/dev/null 2>&1; then
            SECRET_FLAGS="$$SECRET_FLAGS,$$NAME=$$SECRET:latest"
          fi
        done
        gcloud run deploy "${_SERVICE}" \
          --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$BUILD_ID" \
          --region "${_REGION}" \
          --platform managed \
          --no-invoker-iam-check \
          --port 8080 \
          --memory 1Gi \
          --timeout 900s \
          --service-account "${_SERVICE_ACCOUNT}@$PROJECT_ID.iam.gserviceaccount.com" \
          --add-cloudsql-instances "${_CLOUD_SQL_INSTANCE}" \
          --set-env-vars="$$SET_ENV" \
          $$SECRET_FLAGS

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$BUILD_ID'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
